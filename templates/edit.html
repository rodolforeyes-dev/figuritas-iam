{% extends "base.html" %}
{% block content %}
<div class="edit-header">
  <div>
    <h2>{{ participant.responsable }}</h2>
    <p class="text-muted">{{ participant.alumno }} — {{ participant.salita }}</p>
  </div>
  <a href="/" class="btn btn-outline btn-sm">Salir</a>
</div>

<div class="mode-toggle">
  <button id="btn-mode-tengo" class="mode-btn mode-active" onclick="setMode('tengo')">Tengo</button>
  <button id="btn-mode-quiero" class="mode-btn" onclick="setMode('quiero')">Quiero</button>
</div>

<div id="sticker-grid" class="sticker-grid">
  {% for i in range(1, 205) %}
  <div class="sticker-cell" data-num="{{ i }}" data-qty="0" onclick="incSticker(this)">
    <span class="sticker-num">{{ i }}</span>
    <span class="sticker-qty">0</span>
    <button class="sticker-dec" onclick="event.stopPropagation(); decSticker(this.parentElement)">−</button>
  </div>
  {% endfor %}
</div>

<div class="edit-footer">
  <p class="text-muted" id="save-status">Toque una figurita para marcarla como repetida</p>
  <span id="total-count" class="total-badge">0 figuritas</span>
</div>

<div class="card" id="matches-card" style="margin-top:16px;">
  <h3 style="cursor:pointer;" onclick="toggleMatches()">Mis intercambios <span id="matches-arrow">▸</span></h3>
  <div id="matches-body" style="display:none;">
    <p class="text-muted" id="matches-status">Cargando...</p>
    <div id="matches-tienen"></div>
    <div id="matches-buscan"></div>
  </div>
</div>

<script>
const participantId = '{{ participant.id }}';
const grid = document.getElementById('sticker-grid');
const cells = grid.querySelectorAll('.sticker-cell');
let saveTimeout = null;

let figuritasTengo = {{ participant.figuritas_repetidas | tojson | safe }};
let figuritasQuiero = {{ participant.figuritas_que_quiero | tojson | safe }};
let currentMode = 'tengo';

function getCurrentData() {
  return currentMode === 'tengo' ? figuritasTengo : figuritasQuiero;
}

function getSaveEndpoint() {
  return currentMode === 'tengo'
    ? '/api/participants/' + participantId + '/stickers'
    : '/api/participants/' + participantId + '/wanted';
}

function render() {
  const data = getCurrentData();
  cells.forEach(cell => {
    const num = cell.dataset.num;
    const qty = data[num] || 0;
    cell.dataset.qty = qty;
    cell.querySelector('.sticker-qty').textContent = qty;
    cell.classList.toggle('has-sticker', qty > 0);
    cell.classList.toggle('wants-sticker', false);
    if (currentMode === 'quiero') {
      cell.classList.remove('has-sticker');
      cell.classList.toggle('wants-sticker', qty > 0);
    }
  });
  const total = Object.values(getCurrentData()).filter(v => v > 0).length;
  document.getElementById('total-count').textContent = total + ' figuritas';
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-mode-tengo').classList.toggle('mode-active', mode === 'tengo');
  document.getElementById('btn-mode-quiero').classList.toggle('mode-active', mode === 'quiero');
  const label = mode === 'tengo' ? 'repetida' : 'que quiero';
  document.getElementById('save-status').textContent = 'Toque una figurita para marcarla como ' + label;
  render();
}

function incSticker(cell) {
  const num = cell.dataset.num.toString();
  const data = getCurrentData();
  data[num] = (data[num] || 0) + 1;
  render();
  scheduleSave();
}

function decSticker(cell) {
  const num = cell.dataset.num.toString();
  const data = getCurrentData();
  if ((data[num] || 0) > 0) {
    data[num] -= 1;
    if (data[num] <= 0) delete data[num];
    render();
    scheduleSave();
  }
}

function scheduleSave() {
  document.getElementById('save-status').textContent = 'Guardando...';
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveStickers, 500);
}

async function saveStickers() {
  try {
    const res = await fetch(getSaveEndpoint(), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ figuritas_repetidas: getCurrentData() })
    });
    if (res.ok) {
      document.getElementById('save-status').textContent = 'Guardado automáticamente ✓';
    } else {
      document.getElementById('save-status').textContent = 'Error al guardar';
    }
  } catch {
    document.getElementById('save-status').textContent = 'Error de conexión';
  }
}

// ─── Matches ─────────────────────────────────

function toggleMatches() {
  const body = document.getElementById('matches-body');
  const arrow = document.getElementById('matches-arrow');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  arrow.textContent = isOpen ? '▸' : '▾';
  if (!isOpen) loadMatches();
}

async function loadMatches() {
  const status = document.getElementById('matches-status');
  const tienenDiv = document.getElementById('matches-tienen');
  const buscanDiv = document.getElementById('matches-buscan');
  try {
    const res = await fetch('/api/matches/wanted/' + participantId);
    const data = await res.json();
    status.style.display = 'none';

    const tienen = data.tienen_lo_que_busco || [];
    const buscan = data.buscan_lo_que_tengo || [];

    if (tienen.length === 0 && buscan.length === 0) {
      tienenDiv.innerHTML = '<p class="text-muted">Sin coincidencias todavía. Marcá figuritas como "Tengo" y "Quiero" para encontrar intercambios.</p>';
      return;
    }

    if (tienen.length > 0) {
      let html = '<h4 style="color:var(--verde);margin:12px 0 6px;">✅ Tienen lo que busco</h4>';
      tienen.forEach(m => {
        html += '<div style="border-bottom:1px solid var(--gris-border);padding:10px 0;">' +
          '<strong>' + m.persona.responsable + '</strong>' +
          '<span class="text-muted"> — ' + m.persona.alumno + ' (' + m.persona.salita + ')</span>' +
          '<div style="margin-top:6px;">' +
            m.figuritas.map(f =>
              '<span class="match-num">' + f.numero + ' (ellos: ' + f.cantidad_b + ')</span>'
            ).join(' ') +
          '</div>' +
        '</div>';
      });
      tienenDiv.innerHTML = html;
    } else {
      tienenDiv.innerHTML = '';
    }

    if (buscan.length > 0) {
      let html = '<h4 style="color:var(--celeste);margin:12px 0 6px;">🔄 Buscan lo que tengo</h4>';
      buscan.forEach(m => {
        html += '<div style="border-bottom:1px solid var(--gris-border);padding:10px 0;">' +
          '<strong>' + m.persona.responsable + '</strong>' +
          '<span class="text-muted"> — ' + m.persona.alumno + ' (' + m.persona.salita + ')</span>' +
          '<div style="margin-top:6px;">' +
            m.figuritas.map(f =>
              '<span class="match-num">' + f.numero + ' (yo tengo: ' + f.cantidad_a + ')</span>'
            ).join(' ') +
          '</div>' +
        '</div>';
      });
      buscanDiv.innerHTML = html;
    } else {
      buscanDiv.innerHTML = '';
    }
  } catch {
    status.textContent = 'Error al cargar coincidencias';
  }
}

render();
</script>
{% endblock %}
